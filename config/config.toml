# --- CONFIGURACIÓN LÓGICA DEL SISTEMA ---

[general]
app_name = "py-mail"
version = "0.1.0"

[mail]
# Configuración global de correo
sender_name = "Asistente Académico UPN"

[templates]
# Carpeta donde residen los .html de Jinja
base_dir = "templates"

[templates.bienvenida_alumnos]
subject = "Bienvenida al curso: {curso} - {id}"
# Nombres de archivos que deben estar en PATH_ADJUNTOS_ALUMNOS
attachments = [
  "Cambio de contraseña - Estudiante.pdf", "Configuración_de_Microsoft_Authenticator_Estudiante.pdf",
  "GUIA CONTACTO UPN.pdf", "MANUAL PARA CONSULTAS A CONTACTO UPN.pdf",
  "Reglamento de estudios de la escuela de posgrado y estudios continuos.pdf",
  "condiciones de servicio de enseñanza.pdf"
]
attachments_path = "PATH_ADJUNTOS_ALUMNOS"
type = "student_welcome"

[templates.inicio_docentes]
subject = "Inicio de curso: {fecha_inicio} - {curso} - {id}"
attachments = [
  "FONT PRINCIPAL SHARP GROTESK BOOK_SEMIBOLD_ BOLD.zip", "Manual Portal Académico.pdf",
  "acceder a videconferencias - class for teams.png", "IMAGEN ESTRUCTURA.png",
  "UPN PPT Patron ppt.pptx", "Presentación DOCENTE EPEC.pptx"
]
attachments_path = "PATH_ADJUNTOS_DOCENTES"
type = "teacher_start"


[templates.informe_semanal]
subject = "Reporte semanal supervisión - {fecha_lunes} al {fecha_domingo}"
fixed_recipient = "william.cruzado@upn.edu.pe"
type = "weekly_report"

[business_rules]
# Aquí podemos meter reglas como el límite de alumnos por correo en CCO, etc.
max_recipients_cco = 50

